name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Build web package
        working-directory: web
        run: npm run build

      - name: Build Pages artifact
        working-directory: web
        run: |
          mkdir -p ../.pages/downloads
          cp demo/index.html ../.pages/index.html
          cp -R demo/images ../.pages/images
          cp -R dist ../.pages/dist
          cp dist/index.js ../.pages/downloads/digital-pet.js
          npm pack --pack-destination ../.pages/downloads
          mv ../.pages/downloads/ranjeet447-digital-pet-*.tgz ../.pages/downloads/digital-pet-0.1.0.tgz
          sed -i 's#\.\./dist/index\.js#./dist/index.js#g' ../.pages/index.html
          touch ../.pages/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .pages

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
