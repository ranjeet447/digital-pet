name: Create Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop - ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS Apple Silicon
            runner: macos-15
            command: npm run dist:mac
            artifact: macos
            path: desktop/release/*.zip
          - name: Windows x64
            runner: windows-latest
            command: npm run dist:win -- --x64
            artifact: windows-x64
            path: desktop/release/*.exe
          - name: Linux x64
            runner: ubuntu-latest
            command: npm run dist:linux -- --x64
            artifact: linux-x64
            path: desktop/release/*.AppImage

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            desktop/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm ci

      - name: Build desktop package
        working-directory: desktop
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: ${{ matrix.command }}

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}
          if-no-files-found: error

  web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web build dependencies
        working-directory: web
        run: npm ci

      - name: Build web package
        working-directory: web
        run: npm run build

      - name: Pack web package
        working-directory: web
        shell: bash
        run: |
          npm pack
          cp dist/index.js "Digital-Pet-Web-${GITHUB_REF_NAME}.js"
          sed -i '/sourceMappingURL=index.js.map/d' "Digital-Pet-Web-${GITHUB_REF_NAME}.js"

      - name: Upload web artifact
        uses: actions/upload-artifact@v7
        with:
          name: web
          path: |
            web/ranjeet447-digital-pet-*.tgz
            web/Digital-Pet-Web-*.js
          if-no-files-found: error

  release:
    needs:
      - desktop
      - web
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            release-assets/* \
            --repo "$GITHUB_REPOSITORY" \
            --generate-notes \
            --title "Digital Pet $GITHUB_REF_NAME"
